# Fake News Detection — Render deployment config
# Place this file at the repo root or in /backend
services:
  - type: web
    name: fake-news-detector-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    plan: free
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
